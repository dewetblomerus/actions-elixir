name: Elixir Mix Audit
description: Set up Elixir, restore Mix caches, install dependencies, and run mix deps.audit.

inputs:
  audit-command:
    description: Command that runs the repository's informational dependency audit.
    required: false
    default: mix deps.audit
  cache-version:
    description: Manual cache-busting value.
    required: false
    default: v1
  deps-command:
    description: Command that installs project dependencies.
    required: false
    default: mix deps.get
  elixir-version:
    description: Elixir version to install when version-file is not present.
    required: false
    default: "1.19.5-otp-29"
  mix-env:
    description: MIX_ENV used for dependency installation and audit.
    required: false
    default: test
  otp-version:
    description: Erlang/OTP version to install when version-file is not present.
    required: false
    default: "29.1"
  version-file:
    description: Version file read by erlef/setup-beam, usually .tool-versions.
    required: false
    default: .tool-versions
  working-directory:
    description: Directory that contains mix.exs.
    required: false
    default: .

runs:
  using: composite
  steps:
    - name: Set up Elixir from version file
      id: setup-beam-file
      if: hashFiles(format('{0}/{1}', inputs.working-directory, inputs.version-file)) != ''
      uses: erlef/setup-beam@v1
      with:
        version-file: ${{ inputs.working-directory }}/${{ inputs.version-file }}
        version-type: strict

    - name: Set up Elixir from inputs
      id: setup-beam-inputs
      if: hashFiles(format('{0}/{1}', inputs.working-directory, inputs.version-file)) == ''
      uses: erlef/setup-beam@v1
      with:
        otp-version: ${{ inputs.otp-version }}
        elixir-version: ${{ inputs.elixir-version }}
        version-type: strict

    - name: Cache dependencies
      uses: actions/cache@v5
      with:
        path: ${{ inputs.working-directory }}/deps
        key: ${{ runner.os }}-mix-deps-${{ inputs.cache-version }}-${{ hashFiles(format('{0}/{1}', inputs.working-directory, inputs.version-file)) }}-${{ hashFiles(format('{0}/mix.lock', inputs.working-directory)) }}
        restore-keys: |
          ${{ runner.os }}-mix-deps-${{ inputs.cache-version }}-
          ${{ runner.os }}-mix-deps-

    - name: Install dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: ${{ inputs.deps-command }}
      env:
        MIX_ENV: ${{ inputs.mix-env }}

    - name: Audit dependencies
      shell: bash
      working-directory: ${{ inputs.working-directory }}
      run: ${{ inputs.audit-command }}
      env:
        MIX_ENV: ${{ inputs.mix-env }}
