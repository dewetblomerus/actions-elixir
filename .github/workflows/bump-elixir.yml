name: Bump Elixir

on:
  workflow_call:
    inputs:
      assignees:
        description: GitHub usernames assigned to the pull request.
        required: false
        type: string
        default: dewetblomerus
      branch:
        description: Branch name used for the version bump pull request.
        required: false
        type: string
        default: bump-elixir-version
      commit-message:
        description: Commit message for the version bump.
        required: false
        type: string
        default: Bump Elixir version
      pr-body:
        description: Pull request body.
        required: false
        type: string
        default: |
          Bumps the app to the shared Elixir, Erlang, and Debian versions.
      pr-title:
        description: Pull request title.
        required: false
        type: string
        default: Bump Elixir version
    secrets:
      create-pull-request-token:
        description: GitHub token used to create the pull request.
        required: true

permissions:
  contents: write
  pull-requests: write

jobs:
  bump-elixir:
    name: Bump Elixir
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Bump Elixir versions
        shell: bash
        env:
          ELIXIR_VERSION: "1.20.0"
          ELIXIR_MINOR_VERSION: "1.20"
          TOOL_ELIXIR_VERSION: "1.20.0-otp-29"
          ERLANG_VERSION: "29.0"
          DOCKER_OTP_VERSION: "29.0"
          DEBIAN_VERSION: "trixie-20260518-slim"
        run: |
          set -euo pipefail

          if [[ -f .tool-versions ]]; then
            perl -0pi -e 's/^elixir\s+.+$/elixir $ENV{TOOL_ELIXIR_VERSION}/m; s/^erlang\s+.+$/erlang $ENV{ERLANG_VERSION}/m' .tool-versions
          fi

          if [[ -f Dockerfile ]]; then
            perl -0pi -e 's/^ARG ELIXIR_VERSION=.+$/ARG ELIXIR_VERSION=$ENV{ELIXIR_VERSION}/m; s/^ARG OTP_VERSION=.+$/ARG OTP_VERSION=$ENV{DOCKER_OTP_VERSION}/m; s/^ARG DEBIAN_VERSION=.+$/ARG DEBIAN_VERSION=$ENV{DEBIAN_VERSION}/m' Dockerfile
          fi

          if [[ -f mix.exs ]]; then
            perl -0pi -e 's/elixir:\s*"~>\s*\d+\.\d+(?:\.\d+)?"/elixir: "~> $ENV{ELIXIR_MINOR_VERSION}"/' mix.exs
          fi

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.create-pull-request-token }}
          branch: ${{ inputs.branch }}
          commit-message: ${{ inputs.commit-message }}
          title: ${{ inputs.pr-title }}
          body: ${{ inputs.pr-body }}
          assignees: ${{ inputs.assignees }}
